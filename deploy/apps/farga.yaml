# Occitan Stack — Farga (durable memory layer)
#
# Farga is the durable memory and context store for the stack. It exposes
# a KV store and signal log used by agents to maintain continuity across
# sessions. Written in Rust.
#
# In this public manifest, the image points to the mock echo-agent.
# Override with the real image in your values-production.yaml.
#
# Source: https://github.com/miegjorn/Farga
#
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: farga
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: occitan
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/miegjorn/Occitan
    targetRevision: HEAD
    path: deploy/manifests/farga
  destination:
    server: https://kubernetes.default.svc
    namespace: occitan-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
