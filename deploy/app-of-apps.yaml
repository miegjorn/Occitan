# Occitan Stack — App of Apps
#
# This is the root ArgoCD Application. It points ArgoCD at deploy/apps/,
# which contains one Application manifest per stack component.
#
# Applied by bootstrap/argocd-bootstrap.sh during initial cluster provisioning.
# After that, ArgoCD manages itself via GitOps.
#
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: occitan-stack
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: occitan
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/miegjorn/Occitan
    targetRevision: HEAD
    path: deploy/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
