name: Cartulari - Documentation Harvester

# Cartulari pulls READMEs from all Occitan component repositories,
# sanitizes private references, and commits the result to docs/.
#
# Runs weekly on Monday at 04:00 UTC, or manually via workflow_dispatch.
# Changes are opened as a PR -- never pushed directly to main.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1'

permissions:
  contents: write
  pull-requests: write

jobs:
  harvest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Harvest and sanitize component docs
        env:
          # CARTULARI_TOKEN must be a PAT with repo read scope on the miegjorn org.
          # GITHUB_TOKEN only covers this repo and cannot read private component repos.
          # Create at: https://github.com/settings/tokens/new?scopes=repo&description=cartulari
          # Then add as Actions secret: Settings > Secrets > Actions > CARTULARI_TOKEN
          # Falls back to GITHUB_TOKEN if CARTULARI_TOKEN is not set.
          GH_TOKEN: ${{ secrets.CARTULARI_TOKEN || secrets.GITHUB_TOKEN }}
        run: python .github/scripts/cartulari.py

      - name: Open PR if docs changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet docs/; then
            echo "No documentation changes -- nothing to commit."
            exit 0
          fi

          BRANCH="cartulari/docs-$(date +%Y%m%d-%H%M)"
          git config user.name "Cartulari"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add docs/
          git commit -m "docs: Cartulari harvest $(date +%Y-%m-%d)"
          git push origin "$BRANCH"

          cat > /tmp/pr-body.md << 'PREOF'
          Automated documentation harvest from Occitan component repositories.

          **What Cartulari does:**
          - Fetches README.md from each component repo (Gardian, Fondament, Farga, Amassada, Charradissa, Cor, Caissa)
          - Applies sanitization rules (private domain, inline secrets, private IPs)
          - Writes structured output to `docs/components/`

          **Review before merging:**
          - Confirm no `occitane.guilhem` or other private references slipped through
          - Confirm no token/secret values appear in any generated file

          Generated by [Cartulari](.github/workflows/cartulari.yml)
          PREOF

          gh pr create \
            --title "docs: Cartulari harvest $(date +%Y-%m-%d)" \
            --body-file /tmp/pr-body.md \
            --base main \
            --head "$BRANCH"
