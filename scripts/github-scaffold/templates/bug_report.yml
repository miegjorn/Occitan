name: Bug report
description: Something is broken
labels: ["component:__COMPONENT__"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you expect, what did you get instead
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
    validations:
      required: false
